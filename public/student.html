<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Charlemagne Student Help</title>
    <link rel="stylesheet" href="/style.css" />
    <style>
      body {
        min-height: 100vh;
      }

      .student-shell {
        width: min(920px, calc(100% - 2rem));
        margin: 0 auto;
        padding: 2rem 0;
        display: grid;
        gap: 1rem;
      }

      .student-panel {
        display: grid;
        gap: 1rem;
      }

      .student-session {
        color: #b9d8d1;
        overflow-wrap: anywhere;
      }

      .student-form {
        display: grid;
        gap: 0.75rem;
      }

      .student-form textarea {
        width: 100%;
        min-height: 130px;
      }

      .student-response {
        min-height: 180px;
        white-space: pre-wrap;
      }

      .student-history {
        display: grid;
        gap: 0.75rem;
      }

      .student-history-item {
        display: grid;
        gap: 0.4rem;
        padding: 0.75rem;
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 8px;
        background: rgba(3,9,10,0.34);
      }

      .student-history-item strong {
        color: #effff8;
      }

      .student-history-item p {
        margin: 0;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <main class="student-shell">
      <section class="panel student-panel">
        <div class="panel-title-row">
          <h1>Ask Charlemagne</h1>
          <span id="studentStatus" class="status-pill">Checking link</span>
        </div>
        <p class="student-session" id="studentSessionMessage">Checking your classroom session...</p>
        <p class="student-session">Session: <strong id="sessionIdText">Missing session</strong></p>

        <form id="studentMessageForm" class="student-form">
          <label class="sr-only" for="studentMessageInput">Message</label>
          <textarea
            id="studentMessageInput"
            name="message"
            placeholder="Ask a science question..."
            rows="6"
          ></textarea>
          <div class="button-row">
            <button type="submit" id="studentSendButton">Send</button>
          </div>
        </form>
      </section>

      <section class="panel student-panel">
        <div class="panel-title-row">
          <h2>Response</h2>
          <span id="studentRouteInfo" class="stream-status">No route yet</span>
        </div>
        <div id="studentResponse" class="response-text student-response">Ask a question to see the response here.</div>
      </section>

      <section class="panel student-panel">
        <div class="panel-title-row">
          <h2>Chat History</h2>
          <span id="studentHistoryCount" class="stream-status">0 messages</span>
        </div>
        <div id="studentHistory" class="student-history">
          <p class="student-session">Your questions and answers will stay here during this page session.</p>
        </div>
      </section>
    </main>

    <script>
      (() => {
        const params = new URLSearchParams(window.location.search);
        const sessionId = params.get('sessionId') || '';
        const form = document.getElementById('studentMessageForm');
        const input = document.getElementById('studentMessageInput');
        const sendButton = document.getElementById('studentSendButton');
        const responseBox = document.getElementById('studentResponse');
        const sessionText = document.getElementById('sessionIdText');
        const status = document.getElementById('studentStatus');
        const routeInfo = document.getElementById('studentRouteInfo');
        const sessionMessage = document.getElementById('studentSessionMessage');
        const historyBox = document.getElementById('studentHistory');
        const historyCount = document.getElementById('studentHistoryCount');
        const chatHistory = [];
        let sessionIsValid = false;

        sessionText.textContent = sessionId || 'Missing session';
        setFormEnabled(false);

        validateSession();

        form.addEventListener('submit', async (event) => {
          event.preventDefault();
          const message = input.value.trim();
          if (!message || !sessionIsValid) return;

          setFormEnabled(false);
          status.textContent = 'Sending';
          responseBox.textContent = 'Thinking...';
          routeInfo.textContent = 'Routing';

          try {
            const response = await fetch('/api/student/message', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ sessionId, message })
            });
            const data = await response.json();

            if (!response.ok) {
              throw new Error(data.error || 'Could not send message.');
            }

            responseBox.textContent = data.response || 'No response returned.';
            routeInfo.textContent = `${data.routeType || 'unknown'} / ${data.confidence || 'unknown'}`;
            status.textContent = 'Ready';
            addHistoryItem(message, data.response || 'No response returned.');
            input.value = '';
          } catch (error) {
            responseBox.textContent = error.message || 'Could not send message.';
            routeInfo.textContent = 'Error';
            status.textContent = 'Error';
            if (/session/i.test(error.message || '')) {
              showInvalidSession(error.message);
            }
          } finally {
            setFormEnabled(sessionIsValid);
            if (sessionIsValid) input.focus();
          }
        });

        async function validateSession() {
          if (!sessionId) {
            showInvalidSession('This student link is missing a session id. Ask your teacher for a new link.');
            return;
          }

          try {
            const response = await fetch('/api/profile/student-sessions', { cache: 'no-store' });
            const data = await response.json();

            if (!response.ok) {
              throw new Error(data.error || 'Could not check this student session.');
            }

            const sessions = Array.isArray(data.sessions) ? data.sessions : [];
            const session = sessions.find((item) => item.sessionId === sessionId);

            if (!session) {
              showInvalidSession('This student session is not active. Ask your teacher for a new link.');
              return;
            }

            sessionIsValid = true;
            sessionText.textContent = sessionId;
            sessionMessage.textContent = 'Connected to session.';
            status.textContent = 'Connected';
            responseBox.textContent = 'Ask a question to see the response here.';
            setFormEnabled(true);
            input.focus();
          } catch (error) {
            showInvalidSession(error.message || 'Could not check this student session.');
          }
        }

        function showInvalidSession(message) {
          sessionIsValid = false;
          sessionMessage.textContent = message;
          status.textContent = 'Invalid session';
          routeInfo.textContent = 'Unavailable';
          responseBox.textContent = message;
          setFormEnabled(false);
        }

        function setFormEnabled(enabled) {
          input.disabled = !enabled;
          sendButton.disabled = !enabled;
        }

        function addHistoryItem(message, response) {
          chatHistory.unshift({ message, response });
          historyCount.textContent = `${chatHistory.length} message${chatHistory.length === 1 ? '' : 's'}`;
          historyBox.innerHTML = chatHistory.map((item) => `
            <article class="student-history-item">
              <strong>You asked</strong>
              <p>${escapeHtml(item.message)}</p>
              <strong>Charlemagne answered</strong>
              <p>${escapeHtml(item.response)}</p>
            </article>
          `).join('');
        }

        function escapeHtml(value) {
          return String(value ?? '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
        }
      })();
    </script>
  </body>
</html>
