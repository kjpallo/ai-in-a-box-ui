<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Charlemagne Student Help</title>
    <link rel="stylesheet" href="/style.css" />
    <style>
      body {
        min-height: 100vh;
      }

      .student-shell {
        width: min(920px, calc(100% - 2rem));
        margin: 0 auto;
        padding: 1.5rem 0 2rem;
        display: grid;
        gap: 1rem;
      }

      .student-panel {
        display: grid;
        gap: 1rem;
      }

      .student-response-panel {
        position: relative;
        overflow: visible;
      }

      .student-session {
        color: #b9d8d1;
        overflow-wrap: anywhere;
      }

      .student-form {
        display: grid;
        gap: 0.75rem;
      }

      .student-form textarea {
        width: 100%;
        min-height: 130px;
      }

      .student-input-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        flex-wrap: wrap;
      }

      .student-input-actions .button-row {
        margin: 0;
      }

      .student-highlight-button {
        min-height: 34px;
        padding: 0.45rem 0.7rem;
        border-radius: 8px;
        font-size: 0.78rem;
        box-shadow: 0 0 18px rgba(126,233,255,0.1);
      }

      .student-energy {
        display: grid;
        gap: 0.45rem;
        padding: 0.65rem 0.75rem;
        border: 1px solid rgba(126,233,255,0.2);
        border-radius: 8px;
        background: rgba(4,14,17,0.62);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 0 22px rgba(102,247,209,0.08);
      }

      .student-energy[hidden] {
        display: none;
      }

      .student-energy-top {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 0.75rem;
        color: #dffdf6;
        font-size: 0.82rem;
      }

      .student-energy-top strong {
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .student-energy-value {
        color: #b9d8d1;
        text-align: right;
      }

      .student-energy-track {
        height: 13px;
        padding: 2px;
        border: 1px solid rgba(126,233,255,0.3);
        border-radius: 999px;
        background: rgba(0,0,0,0.38);
        box-shadow: inset 0 0 12px rgba(0,0,0,0.42);
      }

      .student-energy-fill {
        width: 100%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #66f7d1, #7ee9ff);
        box-shadow: 0 0 14px rgba(102,247,209,0.56), 0 0 22px rgba(126,233,255,0.26);
        transition: width 180ms ease, background 180ms ease, box-shadow 180ms ease;
      }

      .student-energy.is-low .student-energy-fill {
        background: linear-gradient(90deg, #ffd666, #ff9f43);
        box-shadow: 0 0 14px rgba(255,214,102,0.48), 0 0 24px rgba(255,159,67,0.22);
      }

      .student-energy.is-empty .student-energy-fill {
        background: linear-gradient(90deg, #7f1d1d, #ff6b6b);
        box-shadow: 0 0 14px rgba(255,107,107,0.38);
      }

      .student-energy.is-off .student-energy-track {
        border-color: rgba(102,247,209,0.24);
      }

      .student-response {
        min-height: 180px;
        padding-right: 36px;
        white-space: pre-wrap;
      }

      .student-response-wrap {
        position: relative;
        overflow: visible;
        z-index: 1;
      }

      .student-answer-actions {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 0.55rem;
        flex-wrap: wrap;
      }

      .student-warning {
        position: fixed;
        right: 1rem;
        bottom: 1rem;
        z-index: 20;
        max-width: min(360px, calc(100vw - 2rem));
        padding: 0.8rem 0.95rem;
        border: 1px solid rgba(255, 214, 102, 0.4);
        border-radius: 10px;
        background: rgba(31, 22, 5, 0.94);
        color: #fff5ce;
        box-shadow: 0 18px 44px rgba(0, 0, 0, 0.35);
      }

      .student-warning[hidden] {
        display: none;
      }

      .student-point-button {
        position: absolute;
        top: 50%;
        right: -92px;
        z-index: 5;
        width: 78px;
        height: 78px;
        min-height: 78px;
        padding: 0;
        display: grid;
        place-items: center;
        border: 1px solid rgba(126,233,255,0.56);
        border-radius: 50%;
        background:
          radial-gradient(circle at 50% 30%, rgba(126,233,255,0.26), transparent 46%),
          linear-gradient(180deg, rgba(18,48,58,0.96), rgba(6,24,29,0.98));
        color: #effff8;
        font-size: 0.9rem;
        font-weight: 900;
        letter-spacing: 0;
        line-height: 1;
        text-align: center;
        transform: translateY(-50%);
        box-shadow:
          0 0 22px rgba(126,233,255,0.24),
          0 0 42px rgba(102,247,209,0.1),
          inset 0 1px 0 rgba(255,255,255,0.12);
      }

      .student-point-button:hover {
        border-color: rgba(102,247,209,0.56);
        box-shadow:
          0 0 26px rgba(102,247,209,0.3),
          0 0 52px rgba(126,233,255,0.16),
          inset 0 1px 0 rgba(255,255,255,0.12);
      }

      .student-point-button:active {
        transform: translateY(-50%) scale(0.97);
      }

      .student-point-button.is-flashing {
        animation: pointButtonFlash 620ms ease-out;
      }

      @keyframes pointButtonFlash {
        0% {
          background: linear-gradient(180deg, rgba(35,114,164,0.98), rgba(10,58,93,0.98));
          border-color: rgba(126,233,255,0.9);
          box-shadow:
            0 0 18px rgba(126,233,255,0.78),
            0 0 54px rgba(126,233,255,0.62),
            0 0 86px rgba(126,233,255,0.28);
        }

        55% {
          background: linear-gradient(180deg, rgba(34,132,96,0.98), rgba(8,65,49,0.98));
          border-color: rgba(102,247,209,0.95);
          box-shadow:
            0 0 24px rgba(102,247,209,0.82),
            0 0 68px rgba(102,247,209,0.66),
            0 0 104px rgba(102,247,209,0.32);
        }

        100% {
          background:
            radial-gradient(circle at 50% 30%, rgba(126,233,255,0.26), transparent 46%),
            linear-gradient(180deg, rgba(18,48,58,0.96), rgba(6,24,29,0.98));
          border-color: rgba(126,233,255,0.56);
          box-shadow:
            0 0 22px rgba(126,233,255,0.24),
            0 0 42px rgba(102,247,209,0.1),
            inset 0 1px 0 rgba(255,255,255,0.12);
        }
      }

      .student-history-panel {
        min-height: 0;
      }

      .student-history {
        position: relative;
        z-index: 1;
        display: grid;
        gap: 0.75rem;
        align-content: start;
        max-height: min(34vh, 290px);
        min-height: 170px;
        overflow-y: auto;
        padding: 0.25rem 0.35rem 0.25rem 0;
        overscroll-behavior: contain;
        scrollbar-gutter: stable;
      }

      .student-history-item {
        display: grid;
        gap: 0.65rem;
        padding: 0.75rem;
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 8px;
        background: rgba(3,9,10,0.34);
      }

      .student-history-message {
        display: grid;
        gap: 0.3rem;
      }

      .student-history-message strong {
        font-size: 0.78rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .student-history-message p {
        padding: 0.65rem 0.75rem;
        border-radius: 10px;
        line-height: 1.45;
      }

      .student-history-message.is-student p {
        border: 1px solid rgba(126,233,255,0.2);
        background: rgba(126,233,255,0.08);
      }

      .student-history-message.is-assistant p {
        border: 1px solid rgba(102,247,209,0.2);
        background: rgba(102,247,209,0.08);
      }

      .student-history-item strong {
        color: #effff8;
      }

      .student-history-item p {
        margin: 0;
        white-space: pre-wrap;
      }

      @media (max-width: 760px) {
        .student-shell {
          width: min(100% - 1rem, 680px);
          padding-top: 1rem;
        }

        .student-history {
          max-height: 260px;
        }

        .student-response-wrap {
          padding-right: 0;
        }

        .student-point-button {
          top: auto;
          right: 0.75rem;
          bottom: 0.75rem;
          width: 68px;
          height: 68px;
          min-height: 68px;
          font-size: 0.82rem;
          transform: none;
        }

        .student-response {
          padding-right: 5.5rem;
          padding-bottom: 5.5rem;
        }

        .student-point-button:active {
          transform: scale(0.97);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .student-point-button.is-flashing {
          animation: none;
          background: linear-gradient(180deg, rgba(34,132,96,0.98), rgba(8,65,49,0.98));
          border-color: rgba(102,247,209,0.9);
          box-shadow: 0 0 34px rgba(102,247,209,0.54);
        }
      }
    </style>
  </head>
  <body>
    <main class="student-shell">
      <section class="panel student-panel">
        <div class="panel-title-row">
          <h1>Ask Charlemagne</h1>
          <span id="studentStatus" class="status-pill">Checking link</span>
        </div>
        <p class="student-session" id="studentSessionMessage">Checking your classroom session...</p>
        <p class="student-session">Session: <strong id="sessionIdText">Missing session</strong></p>

        <form id="studentMessageForm" class="student-form">
          <label class="sr-only" for="studentMessageInput">Message</label>
          <textarea
            id="studentMessageInput"
            name="message"
            placeholder="Ask a science question..."
            rows="6"
          ></textarea>
          <div id="studentQuestionEnergy" class="student-energy" role="status" aria-live="polite" hidden>
            <div class="student-energy-top">
              <strong>Question Energy</strong>
              <span id="studentQuestionEnergyValue" class="student-energy-value">Question limit: Off</span>
            </div>
            <div class="student-energy-track" aria-hidden="true">
              <div id="studentQuestionEnergyFill" class="student-energy-fill"></div>
            </div>
          </div>
          <div class="student-input-actions">
            <div class="button-row">
              <button type="submit" id="studentSendButton">Send</button>
            </div>
            <button type="button" id="studentAskHighlightButton" class="small-button secondary-small student-highlight-button">Ask about highlighted text</button>
          </div>
        </form>
      </section>

      <section class="panel student-panel student-response-panel">
        <div class="panel-title-row">
          <h2>Response</h2>
          <div class="student-answer-actions">
            <span id="studentRouteInfo" class="stream-status">No route yet</span>
          </div>
        </div>
        <div class="student-response-wrap">
          <div id="studentResponse" class="response-text student-response">Ask a question to see the response here.</div>
          <button
            type="button"
            id="studentPointButton"
            class="student-point-button"
            aria-label="What’s the point?"
            title="What’s the point?"
          >Point?</button>
        </div>
      </section>

      <section class="panel student-panel student-history-panel" aria-labelledby="studentHistoryTitle">
        <div class="panel-title-row">
          <h2 id="studentHistoryTitle">Chat History</h2>
          <span id="studentHistoryCount" class="stream-status">0 messages</span>
        </div>
        <div id="studentHistory" class="student-history" aria-live="polite" aria-label="Chat history">
          <p class="student-session">Your questions and answers will stay here during this page session.</p>
        </div>
      </section>
    </main>
    <div id="studentFrictionWarning" class="student-warning" role="status" aria-live="polite" hidden></div>

    <script src="/ui-state.js"></script>
    <script src="/api-client.js"></script>
    <script src="/student/student-ui.js"></script>
  </body>
</html>
