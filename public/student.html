<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Charlemagne Student Help</title>
    <link rel="stylesheet" href="/style.css" />
    <style>
      body {
        min-height: 100vh;
      }

      .student-shell {
        width: min(920px, calc(100% - 2rem));
        margin: 0 auto;
        padding: 2rem 0;
        display: grid;
        gap: 1rem;
      }

      .student-panel {
        display: grid;
        gap: 1rem;
      }

      .student-session {
        color: #b9d8d1;
        overflow-wrap: anywhere;
      }

      .student-form {
        display: grid;
        gap: 0.75rem;
      }

      .student-form textarea {
        width: 100%;
        min-height: 130px;
      }

      .student-response {
        min-height: 180px;
        white-space: pre-wrap;
      }

      .student-history {
        display: grid;
        gap: 0.75rem;
      }

      .student-history-item {
        display: grid;
        gap: 0.4rem;
        padding: 0.75rem;
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 8px;
        background: rgba(3,9,10,0.34);
      }

      .student-history-item strong {
        color: #effff8;
      }

      .student-history-item p {
        margin: 0;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <main class="student-shell">
      <section class="panel student-panel">
        <div class="panel-title-row">
          <h1>Ask Charlemagne</h1>
          <span id="studentStatus" class="status-pill">Checking link</span>
        </div>
        <p class="student-session" id="studentSessionMessage">Checking your classroom session...</p>
        <p class="student-session">Session: <strong id="sessionIdText">Missing session</strong></p>

        <form id="studentMessageForm" class="student-form">
          <label class="sr-only" for="studentMessageInput">Message</label>
          <textarea
            id="studentMessageInput"
            name="message"
            placeholder="Ask a science question..."
            rows="6"
          ></textarea>
          <div class="button-row">
            <button type="submit" id="studentSendButton">Send</button>
          </div>
        </form>
      </section>

      <section class="panel student-panel">
        <div class="panel-title-row">
          <h2>Response</h2>
          <span id="studentRouteInfo" class="stream-status">No route yet</span>
        </div>
        <div id="studentResponse" class="response-text student-response">Ask a question to see the response here.</div>
      </section>

      <section class="panel student-panel">
        <div class="panel-title-row">
          <h2>Chat History</h2>
          <span id="studentHistoryCount" class="stream-status">0 messages</span>
        </div>
        <div id="studentHistory" class="student-history">
          <p class="student-session">Your questions and answers will stay here during this page session.</p>
        </div>
      </section>
    </main>

    <script src="/ui-state.js"></script>
    <script src="/api-client.js"></script>
    <script src="/student/student-ui.js"></script>
  </body>
</html>
