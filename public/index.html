<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI in a Box</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <p class="eyebrow">Local assistant UI</p>
        <h1>AI in a Box</h1>
      </header>

      <main class="layout-grid">
        <section class="question-panel panel">
          <div class="panel-title-row">
            <h2>Question</h2>
            <span id="connectionStatus" class="status-pill">Ready</span>
          </div>

          <form id="chatForm" class="question-form">
            <label class="sr-only" for="messageInput">Ask the assistant</label>
            <textarea
              id="messageInput"
              name="message"
              placeholder="Ask your AI in a Box something..."
              rows="10"
            ></textarea>

            <div class="button-row">
              <button type="submit" id="sendButton">Send</button>
              <button type="button" id="stopAudioButton" class="secondary-button">Stop Audio</button>
            </div>
          </form>

          <div class="notes-block">
            <p>index.html = what is on the page</p>
            <p>style.css = what it looks like</p>
            <p>app.js = what the page does</p>
            <p>server.js = how it talks to Ollama and Piper</p>
          </div>
        </section>

        <section class="voice-panel panel">
          <div class="voice-panel-inner">
            <div id="voiceOrb" class="voice-orb idle" aria-live="polite" aria-label="AI voice visualizer">
              <div class="orb-ring orb-ring-one"></div>
              <div class="orb-ring orb-ring-two"></div>
              <div class="orb-core">
                <video
                  id="foxVideo"
                  class="fox-video"
                  autoplay
                  loop
                  muted
                  playsinline
                  preload="auto"
                >
                  <source src="/media/fox.mp4" type="video/mp4" />
                </video>
                <div class="orb-overlay"></div>
              </div>
              <div class="orb-center-label">
                <span>AI</span>
                <span>Voice</span>
              </div>
            </div>
            <p id="voiceStatus" class="voice-status">Listening for the next response...</p>
          </div>
        </section>

        <section class="response-panel panel">
          <div class="panel-title-row">
            <h2>Response</h2>
            <span id="streamStatus" class="stream-status">Waiting</span>
          </div>
          <div id="responseText" class="response-text">Response here in neon green text.</div>
        </section>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
